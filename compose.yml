name: pomodoro-task

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  backend:
    image: ${BACKEND_IMAGE:-backend-pomodoro-task:local}
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    stop_grace_period: 40s
    init: true
    env_file:
      - .env.production
    expose:
      - "8000"
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
    networks:
      - app_net
      - backend_net
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8000/healthz/', timeout=3)
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  nginx:
    image: nginxinc/nginx-unprivileged:1.27-alpine
    entrypoint:
      - nginx
      - -g
      - daemon off;
    restart: unless-stopped
    stop_grace_period: 10s
    init: true
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${NGINX_BIND:-127.0.0.1}:${NGINX_PORT:-8080}:8080"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
    networks:
      - app_net
      - edge_net
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    healthcheck:
      test:
        - CMD
        - wget
        - --quiet
        - --output-document=/dev/null
        - http://127.0.0.1:8080/healthz/
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  app_net:
    internal: true
  edge_net:
    driver: bridge
  backend_net:
    external: true

volumes:
  static_data:
  media_data:
